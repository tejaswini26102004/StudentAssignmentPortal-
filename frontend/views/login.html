<div class="card">
    <h2>🔐 Login</h2>

    <div class="alert alert-success" ng-if="message && !isError">{{message}}</div>
    <div class="alert alert-error" ng-if="message && isError">{{message}}</div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" ng-model="loginData.email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" ng-model="loginData.password" placeholder="Enter your password" />
    </div>

    <button class="btn btn-primary" ng-click="login()">Login</button>

    <p style="text-align:center; margin-top:15px; color:#888;">
        Don't have an account?
        <a href="#!/register" class="link">Register here</a>
    </p>
</div>
