<div class="card">
    <h2>📝 Register</h2>

    <div class="alert alert-success" ng-if="message && !isError">{{message}}</div>
    <div class="alert alert-error" ng-if="message && isError">{{message}}</div>

    <div class="form-group">
        <label>Full Name</label>
        <input type="text" ng-model="registerData.name" placeholder="Enter your full name" />
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" ng-model="registerData.email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" ng-model="registerData.password" placeholder="Create a password" />
    </div>

    <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" ng-model="registerData.dateOfBirth" />
    </div>

    <div class="form-group">
        <label>Designation</label>
        <select ng-model="registerData.designation">
            <option value="">-- Select Role --</option>
            <option value="Teacher">Teacher</option>
            <option value="Student">Student</option>
        </select>
    </div>

    <button class="btn btn-primary" ng-click="register()">Register</button>

    <p style="text-align:center; margin-top:15px; color:#888;">
        Already have an account?
        <a href="#!/login" class="link">Login here</a>
    </p>
</div>
